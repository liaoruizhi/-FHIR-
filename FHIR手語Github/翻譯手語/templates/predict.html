<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手語即時翻譯</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #4CAF50;
      --primary-hover-color: #45a049;
      --background-color: #e8f5e9;
      --card-background: #ffffff;
      --text-color: #333333;
      --border-color: #e0e0e0;
      --success-color: #28a745;
      --warning-color: #ffc107;
      --error-color: #dc3545;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--background-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-color);
      line-height: 1.6;
    }

    .container {
      background: var(--card-background);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 500px;
      width: 90%;
      margin: 20px;
    }

    h2 {
      color: var(--primary-color);
      margin-bottom: 30px;
      font-size: 2em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    h2 svg {
      font-size: 1.5em;
      color: #3f51b5;
    }

    .button-group {
      margin-bottom: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      font-weight: 500;
      flex-grow: 1;
      min-width: 150px;
    }

    button:hover {
      background-color: var(--primary-hover-color);
      transform: translateY(-2px);
    }

    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
      box-shadow: none;
      transform: translateY(0);
    }

    #output {
      background: #f8f8f8;
      padding: 20px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      min-height: 100px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 1.05em;
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.8;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
      transition: background-color 0.3s ease;
    }

    .status-initial { color: #555; }
    .status-success { color: var(--success-color); }
    .status-warning { color: var(--warning-color); }
    .status-error { color: var(--error-color); }
    .status-collecting { color: #007bff; }
    .status-predicting { color: #6f42c1; }

    @media (min-width: 600px) and (max-width: 900px) {
      .container { padding: 30px; width: 85%; }
      h2 { font-size: 1.8em; }
      button { padding: 10px 20px; font-size: 1em; }
      #output { padding: 18px; font-size: 1em; min-height: 90px; }
    }

    @media (max-width: 599px) {
      body { padding: 0; }
      .container { padding: 25px; width: calc(100% - 40px); margin: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-radius: 12px; }
      h2 { font-size: 1.5em; margin-bottom: 20px; flex-direction: column; gap: 5px; }
      .button-group { flex-direction: column; gap: 10px; }
      button { width: 100%; padding: 15px 20px; font-size: 1em; }
      #output { padding: 15px; font-size: 0.9em; min-height: 80px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-ear"><path d="M6 10a7 7 0 0 1 12 0v5a7 7 0 0 1-12 0Z"/><path d="M18 10a10 10 0 0 0-20 0"/><path d="M12 18a4 4 0 0 1 4 4"/><path d="M8 22a4 4 0 0 1 4-4"/></svg>
      手語即時翻譯
    </h2>
    <div class="button-group">
      <button id="btnEnable">啟用感測器</button>
      <button id="btnStart" disabled>開始翻譯 (30筆)</button>
    </div>
    <pre id="output" class="status-initial">請先啟用感測器</pre>
  </div>

  <script>
    const BUFFER_SIZE = 30;
    let motionData = { accel:{}, gyro:{}, orientation:{} };
    let sequence = [];
    let enabled = false;
    const outputElement = document.getElementById("output");
    const btnEnable = document.getElementById("btnEnable");
    const btnStart = document.getElementById("btnStart");

    function rnd(v){ return v!=null? Math.round(v*1000)/1000 : 0; }
    function updateOutput(text, statusClass){
      outputElement.innerText = text;
      outputElement.className = '';
      outputElement.classList.add(statusClass);
    }
    function speakText(text){
      if('speechSynthesis' in window){
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        speechSynthesis.speak(utterance);
      }
    }

    // 啟用感測器
    btnEnable.onclick = async () => {
      if(enabled) return;
      // iOS 權限
      if(typeof DeviceMotionEvent.requestPermission === 'function'){
        try {
          const dm = await DeviceMotionEvent.requestPermission();
          const dor = await DeviceOrientationEvent.requestPermission();
          if(dm !== 'granted' || dor !== 'granted') throw "未授權";
        } catch(e){
          alert("請在 iOS Safari 設定中允許「動作與方向」權限");
          return;
        }
      }
      // 綁事件
      window.addEventListener("devicemotion", e=>{
        motionData.accel = {
          "x 軸加速度": rnd(e.acceleration.x),
          "y 軸加速度": rnd(e.acceleration.y),
          "z 軸加速度": rnd(e.acceleration.z)
        };
        motionData.gyro = {
          "繞 Z 軸 alpha": rnd(e.rotationRate.alpha),
          "繞 X 軸 beta": rnd(e.rotationRate.beta),
          "繞 Y 軸 gamma": rnd(e.rotationRate.gamma)
        };
      });
      window.addEventListener("deviceorientation", e=>{
        motionData.orientation = {
          "α 方向角 (Z軸偏航 yaw)": rnd(e.alpha),
          "β 俯仰角 (X軸 pitch)": rnd(e.beta),
          "γ 翻滾角 (Y軸 roll)": rnd(e.gamma)
        };
      });
      enabled = true;
      speakText("偵測啟動");
      updateOutput("✅ 感測器已啟用", "status-success");
      btnStart.disabled = false;
    };

    // 收集並翻譯
    btnStart.onclick = () => {
      if(!enabled) return;
      sequence=[];
      btnStart.disabled=true;
      updateOutput(`📥 收集中：0/${BUFFER_SIZE}`, "status-collecting");
      let count=0;
      const tid = setInterval(()=>{
        sequence.push(JSON.parse(JSON.stringify(motionData)));
        count++;
        updateOutput(`📥 收集中：${count}/${BUFFER_SIZE}`, "status-collecting");
        if(count>=BUFFER_SIZE){
          clearInterval(tid);
          updateOutput("⏳ 資料收集完成，正在預測…", "status-predicting");
          sendSequence();
        }
      },100);
    };

    function sendSequence(){
      fetch("/predict-sequence", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ sequence })
      })
      .then(r=>r.json())
      .then(d=>{
        if(d.status==="ok"){
          updateOutput(`✅ ${d.prediction}\n準確度：${d.confidence}\n時間：${d.timestamp}`, "status-success");
          speakText(d.prediction);
        } else if(d.status==="uncertain"){
          updateOutput(`⚠️ 無法辨識 (準確度不足)\n時間：${d.timestamp}`, "status-warning");
          speakText("無法辨識，準確度不足");
        } else {
          updateOutput(`❌ 錯誤：${d.message||"未知"}\n時間：${d.timestamp||"-"}`, "status-error");
          speakText("發生錯誤");
        }
      })
      .catch(err=>{
        console.error(err);
        updateOutput("❌ 網路錯誤", "status-error");
        speakText("網路錯誤");
      })
      .finally(()=>{ btnStart.disabled=false; });
    }
  </script>
</body>
</html>
